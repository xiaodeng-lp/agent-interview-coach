name: CI

on:
  push:
  pull_request:

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python files
        run: |
          python -m py_compile \
            app/coach_bot.py \
            app/cli_chat.py \
            app/commands.py \
            app/engine.py \
            app/interview_corpus.py \
            app/materials.py \
            app/model_client.py \
            app/paths.py \
            app/profile_builder.py \
            app/prompts.py \
            app/session_store.py \
            app/smoke_test.py \
            app/wechat_channel.py
